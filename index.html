<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<!-- iPhoneでホーム画面から全画面アプリとして起動するための設定 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="抽出ノート">
<meta name="theme-color" content="#F6F1E7">
<title>抽出ノート</title>
<link rel="stylesheet" href="css/app.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
</head>
<body>
<div id="root"></div>

<!-- JSXを含まないファイルは通常のscriptとして読み込む（トップレベルのconstは全ファイルから参照できる） -->
<script src="js/storage.js"></script>
<script src="js/constants.js"></script>
<script src="js/utils.js"></script>
<script src="js/styles.js"></script>

<!-- JSXを含むファイルはbabelで変換する。babel-standaloneはファイルごとに独立したスコープで
     実行するため、コンポーネントは各ファイル末尾で window に公開して共有する -->
<script type="text/babel" data-presets="react" src="js/components/Bean.js"></script>
<script type="text/babel" data-presets="react" src="js/components/EntryCard.js"></script>
<script type="text/babel" data-presets="react" src="js/components/BeansView.js"></script>
<script type="text/babel" data-presets="react" src="js/components/BeanDetail.js"></script>
<script type="text/babel" data-presets="react" src="js/components/BrewForm.js"></script>
<script type="text/babel" data-presets="react" src="js/components/CoffeeLog.js"></script>
<script type="text/babel" data-presets="react" src="js/main.js"></script>
</body>
</html>
