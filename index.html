<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<!-- iPhoneでホーム画面から全画面アプリとして起動するための設定 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="抽出ノート">
<meta name="theme-color" content="#F6F1E7">
<title>抽出ノート</title>
<style>
  html, body { margin: 0; background: #F6F1E7; }
  #root { padding-top: env(safe-area-inset-top); }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script>
// アーティファクト専用のwindow.storageを、ブラウザ標準のlocalStorageに置き換える
window.storage = {
  get: async (key) => {
    const v = localStorage.getItem(key);
    if (v === null) throw new Error("key not found");
    return { key, value: v };
  },
  set: async (key, value) => { localStorage.setItem(key, value); return { key, value }; },
  delete: async (key) => { localStorage.removeItem(key); return { key, deleted: true }; },
};
</script>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

// ── デザイントークン：ミルクの白とカラメルの琥珀 ──
const C = {
  bg: "#F6F1E7",
  card: "#FFFFFF",
  cardLine: "#E4D9C6",
  accent: "#B8791F",
  accentDim: "#D9B87B",
  text: "#2E2014",
  muted: "#8A7A64",
  danger: "#C0552F",
};

const STORAGE_KEY = "coffee-brews";
const MILLS_KEY = "coffee-mills";
const DEFAULT_MILLS = ["タイムモア C3", "コマンダンテ C40", "1Zpresso", "ポーレックス", "ハリオ"];

const EMPTY = {
  bean: "",
  dose: "",
  water: "",
  mill: "",
  millCustom: "",
  clicks: "",
  time: 0,
  timeStr: "",
  pours: [],
  pourTarget: 5,
  style: "hot",
  ice: "",
  note: "",
  rating: 0,
};

// 豆の形のアイコン（評価用）
function Bean({ filled, size = 26 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" style={{ display: "block" }}>
      <ellipse
        cx="12" cy="12" rx="7.5" ry="10"
        transform="rotate(28 12 12)"
        fill={filled ? C.accent : "none"}
        stroke={filled ? C.accent : C.accentDim}
        strokeWidth="1.6"
      />
      <path
        d="M9.5 4.5 C13 9, 11 15, 14.5 19.5"
        fill="none"
        stroke={filled ? C.bg : C.accentDim}
        strokeWidth="1.4"
        strokeLinecap="round"
        transform="rotate(28 12 12)"
      />
    </svg>
  );
}

function fmtTime(sec) {
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return `${m}:${String(s).padStart(2, "0")}`;
}

// "1:30" や "90" を秒数に変換
function parseTimeStr(s) {
  if (!s) return 0;
  s = String(s).trim();
  if (s.includes(":")) {
    const [m, sec] = s.split(":");
    return (parseInt(m) || 0) * 60 + (parseInt(sec) || 0);
  }
  return parseInt(s) || 0;
}

function CoffeeLog() {
  const [entries, setEntries] = useState([]);
  const [loaded, setLoaded] = useState(false);
  const [view, setView] = useState("beans"); // beans | detail | form
  const [selectedBean, setSelectedBean] = useState(null);
  const [sortBy, setSortBy] = useState("new"); // new | rating
  const [favOnly, setFavOnly] = useState(false);
  const [editingId, setEditingId] = useState(null);
  const [form, setForm] = useState(EMPTY);

  // ミルの管理
  const [mills, setMills] = useState(DEFAULT_MILLS);
  const [millEdit, setMillEdit] = useState(false);
  const [newMill, setNewMill] = useState("");

  // タイマー
  const [running, setRunning] = useState(false);
  const [elapsed, setElapsed] = useState(0);
  const timerRef = useRef(null);

  useEffect(() => {
    (async () => {
      try {
        const r = await window.storage.get(STORAGE_KEY);
        if (r && r.value) setEntries(JSON.parse(r.value));
      } catch (e) {
        // 初回はキーが無いので何もしない
      }
      try {
        const m = await window.storage.get(MILLS_KEY);
        if (m && m.value) setMills(JSON.parse(m.value));
      } catch (e) {
        // 初回は既定のミル一覧を使う
      }
      setLoaded(true);
    })();
    return () => clearInterval(timerRef.current);
  }, []);

  const persistMills = async (next) => {
    setMills(next);
    try {
      await window.storage.set(MILLS_KEY, JSON.stringify(next));
    } catch (e) {
      console.error("保存に失敗しました", e);
    }
  };

  const addMill = () => {
    const name = newMill.trim();
    if (!name || mills.includes(name)) return;
    persistMills([...mills, name]);
    setForm((f) => ({ ...f, mill: name }));
    setNewMill("");
  };

  const removeMill = (m) => {
    persistMills(mills.filter((x) => x !== m));
    if (form.mill === m) setForm((f) => ({ ...f, mill: "" }));
  };

  const persist = async (next) => {
    setEntries(next);
    try {
      await window.storage.set(STORAGE_KEY, JSON.stringify(next));
    } catch (e) {
      console.error("保存に失敗しました", e);
    }
  };

  const toggleTimer = () => {
    if (running) {
      clearInterval(timerRef.current);
      setRunning(false);
      setForm((f) => ({ ...f, time: elapsed, timeStr: fmtTime(elapsed) }));
    } else {
      setElapsed(0);
      // 開始 = 1回目の注湯。0:00 で自動記録する
      setForm((f) => ({ ...f, time: 0, timeStr: "", pours: [{ tStr: "0:00", g: "" }] }));
      setRunning(true);
      const t0 = Date.now();
      timerRef.current = setInterval(() => {
        setElapsed(Math.floor((Date.now() - t0) / 1000));
      }, 250);
    }
  };

  const recordPour = () => {
    if (!running) return;
    setForm((f) => ({ ...f, pours: [...f.pours, { tStr: fmtTime(elapsed), g: "" }] }));
  };

  const updatePour = (i, key, val) => {
    setForm((f) => {
      const pours = f.pours.map((p, j) => (j === i ? { ...p, [key]: val } : p));
      return { ...f, pours };
    });
  };

  const addPour = () => {
    setForm((f) => ({ ...f, pours: [...f.pours, { tStr: "", g: "" }] }));
  };

  const removePour = (i) => {
    setForm((f) => ({ ...f, pours: f.pours.filter((_, j) => j !== i) }));
  };

  const save = () => {
    if (!form.bean.trim()) return;
    const beanName = form.bean.trim();
    const entry = {
      ...form,
      bean: beanName,
      mill: form.mill === "その他" ? (form.millCustom.trim() || "その他") : form.mill,
      time: running ? elapsed : (parseTimeStr(form.timeStr) || form.time),
      pours: form.pours
        .filter((p) => p.tStr !== "" || p.g !== "")
        .map((p) => ({ t: parseTimeStr(p.tStr), g: p.g }))
        .sort((a, b) => a.t - b.t),
    };
    if (running) { clearInterval(timerRef.current); setRunning(false); }

    if (editingId) {
      // 既存の記録を更新（日時とお気に入りは元のまま）
      persist(entries.map((e) =>
        e.id === editingId ? { ...entry, id: e.id, date: e.date, fav: e.fav } : e
      ));
    } else {
      persist([{
        ...entry,
        id: Date.now(),
        fav: false,
        date: new Date().toLocaleDateString("ja-JP", {
          month: "numeric", day: "numeric", hour: "2-digit", minute: "2-digit",
        }),
      }, ...entries]);
    }

    setForm(EMPTY);
    setElapsed(0);
    setEditingId(null);
    setSelectedBean(beanName);
    setView("detail");
  };

  const toggleFav = (id) => {
    persist(entries.map((e) => (e.id === id ? { ...e, fav: !e.fav } : e)));
  };

  const startEdit = (e) => {
    setForm({
      bean: e.bean,
      dose: e.dose || "",
      water: e.water || "",
      mill: !e.mill ? "" : mills.includes(e.mill) ? e.mill : "その他",
      millCustom: e.mill && !mills.includes(e.mill) && e.mill !== "その他" ? e.mill : "",
      clicks: e.clicks || "",
      time: e.time || 0,
      timeStr: e.time ? fmtTime(e.time) : "",
      pours: (e.pours || []).map((p) =>
        typeof p === "number"
          ? { tStr: fmtTime(p), g: "" }
          : { tStr: fmtTime(p.t), g: p.g || "" }
      ),
      pourTarget: e.pourTarget || 5,
      style: e.style || "hot",
      ice: e.ice || "",
      note: e.note || "",
      rating: e.rating || 0,
    });
    setEditingId(e.id);
    setView("form");
  };

  const remove = (id) => {
    const next = entries.filter((e) => e.id !== id);
    persist(next);
    // 削除でその豆の記録が空になったら一覧に戻る
    if (selectedBean && !next.some((e) => e.bean === selectedBean)) {
      setSelectedBean(null);
      setView("beans");
    }
  };

  const ratio = (dose, water) => {
    const d = parseFloat(dose), w = parseFloat(water);
    if (!d || !w) return null;
    return `1:${(w / d).toFixed(1)}`;
  };

  // 豆ごとにグループ化
  const groups = [];
  for (const e of entries) {
    let g = groups.find((x) => x.name === e.bean);
    if (!g) {
      g = { name: e.bean, items: [], latest: 0 };
      groups.push(g);
    }
    g.items.push(e);
    g.latest = Math.max(g.latest, e.id);
  }
  groups.sort((a, b) => b.latest - a.latest);
  for (const g of groups) {
    const rated = g.items.filter((e) => e.rating > 0);
    g.avg = rated.length ? rated.reduce((s, e) => s + e.rating, 0) / rated.length : null;
    g.best = Math.max(...g.items.map((e) => e.rating));
  }

  const beanNames = groups.map((g) => g.name);

  const detailItems = selectedBean
    ? entries
        .filter((e) => e.bean === selectedBean)
        .filter((e) => !favOnly || e.fav)
        .sort((a, b) => sortBy === "rating" ? (b.rating - a.rating) || (b.id - a.id) : b.id - a.id)
    : [];

  const input = {
    width: "100%",
    boxSizing: "border-box",
    background: C.bg,
    border: `1px solid ${C.cardLine}`,
    borderRadius: 10,
    padding: "12px 14px",
    color: C.text,
    fontSize: 16,
    outline: "none",
  };
  const label = {
    fontSize: 11,
    letterSpacing: "0.14em",
    color: C.muted,
    marginBottom: 6,
    display: "block",
  };
  const chip = (active) => ({
    padding: "8px 12px", borderRadius: 999, fontSize: 13, cursor: "pointer",
    border: `1px solid ${active ? C.accent : C.cardLine}`,
    background: active ? C.accent : "transparent",
    color: active ? C.bg : C.muted,
    fontWeight: active ? 700 : 400,
  });

  const entryCard = (e) => (
    <article key={e.id} style={{
      background: C.card,
      border: `1px solid ${C.cardLine}`,
      borderRadius: 14,
      padding: "14px 16px",
      marginBottom: 12,
    }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <div style={{ display: "flex", gap: 4 }}>
            {[1, 2, 3, 4, 5].map((n) => <Bean key={n} filled={n <= e.rating} size={18} />)}
          </div>
          {e.style && (
            <span style={{
              fontSize: 11, fontWeight: 700, letterSpacing: "0.08em",
              padding: "3px 8px", borderRadius: 999,
              background: e.style === "ice" ? "#DCEEF6" : "#F3E3C4",
              color: e.style === "ice" ? "#2A6E8E" : "#8A5A16",
            }}>
              {e.style === "ice" ? `ICE${e.ice ? ` 氷${e.ice}g` : ""}` : "HOT"}
            </span>
          )}
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <span style={{ fontSize: 12, color: C.muted }}>{e.date}</span>
          <button onClick={() => toggleFav(e.id)} style={{
            background: "none", border: "none", cursor: "pointer",
            fontSize: 20, padding: 0, lineHeight: 1,
            color: e.fav ? C.accent : C.accentDim,
          }}>
            {e.fav ? "★" : "☆"}
          </button>
        </div>
      </div>

      <div style={{
        display: "flex", flexWrap: "wrap", gap: "6px 14px",
        fontSize: 13, color: C.muted, margin: "10px 0 0",
      }}>
        {e.dose && <span>豆 <b style={{ color: C.text }}>{e.dose}g</b></span>}
        {e.water && <span>湯 <b style={{ color: C.text }}>{e.water}ml</b></span>}
        {ratio(e.dose, e.water) && <span>比率 <b style={{ color: C.accent }}>{ratio(e.dose, e.water)}</b></span>}
        {e.time > 0 && <span>抽出 <b style={{ color: C.text }}>{fmtTime(e.time)}</b></span>}
        {e.mill && (
          <span>{e.mill}{e.clicks && <> <b style={{ color: C.text }}>{e.clicks}クリック</b></>}</span>
        )}
        {!e.mill && e.grind && <span>{e.grind}</span>}
      </div>

      {e.pours && e.pours.length > 0 && (
        <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginTop: 10 }}>
          {e.pours.map((p, i) => {
            const t = typeof p === "number" ? p : p.t;
            const g = typeof p === "object" && p.g ? p.g : null;
            return (
              <span key={i} style={{
                fontSize: 12, padding: "4px 9px", borderRadius: 999,
                border: `1px solid ${C.cardLine}`, color: C.muted,
                fontVariantNumeric: "tabular-nums",
              }}>
                {i + 1}回目 <b style={{ color: C.text }}>{fmtTime(t)}</b>
                {g && <> ・<b style={{ color: C.accent }}>{g}g</b></>}
              </span>
            );
          })}
        </div>
      )}

      {e.note && <p style={{ margin: "8px 0 0", fontSize: 14, lineHeight: 1.7 }}>{e.note}</p>}

      <div style={{ display: "flex", gap: 18, marginTop: 10 }}>
        <button onClick={() => startEdit(e)} style={{
          background: "none", border: "none",
          color: C.accent, fontSize: 12, padding: 0, cursor: "pointer", fontFamily: "inherit",
        }}>
          編集
        </button>
        <button onClick={() => remove(e.id)} style={{
          background: "none", border: "none",
          color: C.danger, fontSize: 12, padding: 0, cursor: "pointer", fontFamily: "inherit",
        }}>
          削除
        </button>
      </div>
    </article>
  );

  return (
    <div style={{
      minHeight: "100vh",
      background: C.bg,
      color: C.text,
      fontFamily: "'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif",
      maxWidth: 480,
      margin: "0 auto",
      padding: "0 16px 96px",
    }}>
      {/* ヘッダー */}
      <header style={{ padding: "28px 4px 18px", borderBottom: `1px solid ${C.cardLine}` }}>
        <div style={{ fontSize: 11, letterSpacing: "0.28em", color: C.accent }}>BREW LOG</div>
        <h1 style={{ margin: "6px 0 0", fontSize: 24, fontWeight: 700 }}>抽出ノート</h1>
      </header>

      {/* ── 豆の一覧（フォルダ） ── */}
      {view === "beans" && (
        <main style={{ paddingTop: 16 }}>
          {loaded && groups.length === 0 && (
            <div style={{ textAlign: "center", padding: "56px 12px", color: C.muted }}>
              <div style={{ display: "flex", justifyContent: "center", gap: 6, marginBottom: 16 }}>
                <Bean filled size={30} /><Bean size={30} /><Bean size={30} />
              </div>
              <p style={{ margin: 0, lineHeight: 1.8 }}>
                まだ記録がありません。<br />最初の一杯を淹れたら「記録する」から。
              </p>
            </div>
          )}

          {groups.map((g) => (
            <button key={g.name}
              onClick={() => { setSelectedBean(g.name); setSortBy("new"); setFavOnly(false); setView("detail"); }}
              style={{
                display: "block", width: "100%", textAlign: "left", cursor: "pointer",
                background: C.card, border: `1px solid ${C.cardLine}`,
                borderRadius: 14, padding: "16px", marginBottom: 12,
                color: C.text, fontFamily: "inherit",
              }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <strong style={{ fontSize: 17 }}>{g.name}</strong>
                <span style={{ color: C.accentDim, fontSize: 18 }}>›</span>
              </div>
              <div style={{
                display: "flex", alignItems: "center", gap: 14,
                marginTop: 8, fontSize: 13, color: C.muted,
              }}>
                <span><b style={{ color: C.text }}>{g.items.length}</b> 杯</span>
                {g.items.some((i) => i.fav) && (
                  <span style={{ color: C.accent }}>★ {g.items.filter((i) => i.fav).length}</span>
                )}
                {g.avg !== null && (
                  <span style={{ display: "flex", alignItems: "center", gap: 4 }}>
                    <Bean filled size={14} />
                    平均 <b style={{ color: C.accent }}>{g.avg.toFixed(1)}</b>
                  </span>
                )}
                <span style={{ marginLeft: "auto" }}>{g.items[0].date}</span>
              </div>
            </button>
          ))}
        </main>
      )}

      {/* ── 豆の詳細（記録一覧＋ソート） ── */}
      {view === "detail" && selectedBean && (
        <main style={{ paddingTop: 14 }}>
          <button onClick={() => { setView("beans"); setSelectedBean(null); }} style={{
            background: "none", border: "none", color: C.accent,
            fontSize: 14, padding: "4px 0", cursor: "pointer", fontFamily: "inherit",
          }}>
            ‹ 豆の一覧へ
          </button>
          <h2 style={{ margin: "8px 0 12px", fontSize: 20 }}>{selectedBean}</h2>

          <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
            <button style={chip(sortBy === "new")} onClick={() => setSortBy("new")}>新着順</button>
            <button style={chip(sortBy === "rating")} onClick={() => setSortBy("rating")}>高評価順</button>
            <button style={chip(favOnly)} onClick={() => setFavOnly(!favOnly)}>★ お気に入り</button>
          </div>

          {favOnly && detailItems.length === 0 && (
            <p style={{ color: C.muted, fontSize: 14, textAlign: "center", padding: "32px 0" }}>
              この豆にお気に入りの記録はまだありません。<br />記録の ☆ をタップして登録できます。
            </p>
          )}

          {detailItems.map(entryCard)}
        </main>
      )}

      {/* ── 記録フォーム ── */}
      {view === "form" && (
        <main style={{ paddingTop: 18, display: "grid", gap: 16 }}>
          <div>
            <span style={label}>豆の名前</span>
            {beanNames.length > 0 && (
              <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 10 }}>
                {beanNames.map((b) => (
                  <button key={b} style={chip(form.bean === b)}
                    onClick={() => setForm({ ...form, bean: b })}>
                    {b}
                  </button>
                ))}
              </div>
            )}
            <input style={input} value={form.bean} placeholder="エチオピア イルガチェフェ"
              onChange={(ev) => setForm({ ...form, bean: ev.target.value })} />
            <p style={{ fontSize: 12, color: C.muted, margin: "6px 0 0" }}>
              同じ名前で記録すると、同じ豆としてまとまります。
            </p>
          </div>

          <div>
            <span style={label}>スタイル</span>
            <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
              <button style={chip(form.style === "hot")}
                onClick={() => setForm({ ...form, style: "hot", ice: "" })}>
                ☕ ホット
              </button>
              <button style={chip(form.style === "ice")}
                onClick={() => setForm({ ...form, style: "ice" })}>
                🧊 アイス
              </button>
              {form.style === "ice" && (
                <div style={{ display: "flex", alignItems: "center", gap: 6, flex: 1 }}>
                  <input style={{ ...input, textAlign: "center" }} inputMode="decimal"
                    value={form.ice} placeholder="氷の量"
                    onChange={(ev) => setForm({ ...form, ice: ev.target.value })} />
                  <span style={{ fontSize: 13, color: C.muted }}>g</span>
                </div>
              )}
            </div>
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
            <div>
              <span style={label}>豆の量 (g)</span>
              <input style={input} inputMode="decimal" value={form.dose} placeholder="15"
                onChange={(ev) => setForm({ ...form, dose: ev.target.value })} />
            </div>
            <div>
              <span style={label}>湯量 (ml)</span>
              <input style={input} inputMode="decimal" value={form.water} placeholder="225"
                onChange={(ev) => setForm({ ...form, water: ev.target.value })} />
            </div>
          </div>

          <div>
            <div style={{ display: "flex", alignItems: "baseline", justifyContent: "space-between" }}>
              <span style={label}>コーヒーミル</span>
              <button onClick={() => { setMillEdit(!millEdit); setNewMill(""); }} style={{
                background: "none", border: "none", cursor: "pointer",
                color: C.accent, fontSize: 12, fontFamily: "inherit", padding: 0,
              }}>
                {millEdit ? "完了" : "ミルを編集"}
              </button>
            </div>

            {!millEdit && (
              <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 10 }}>
                {mills.map((m) => (
                  <button key={m} style={chip(form.mill === m)}
                    onClick={() => setForm({ ...form, mill: m })}>
                    {m}
                  </button>
                ))}
                <button style={chip(form.mill === "その他")}
                  onClick={() => setForm({ ...form, mill: "その他" })}>
                  その他
                </button>
              </div>
            )}

            {millEdit && (
              <div style={{ marginBottom: 10 }}>
                <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 10 }}>
                  {mills.map((m) => (
                    <button key={m} onClick={() => removeMill(m)} style={{
                      ...chip(false), borderColor: C.danger, color: C.danger,
                    }}>
                      {m} ✕
                    </button>
                  ))}
                  {mills.length === 0 && (
                    <span style={{ fontSize: 13, color: C.muted }}>登録されたミルはありません</span>
                  )}
                </div>
                <div style={{ display: "flex", gap: 8 }}>
                  <input style={{ ...input, flex: 1 }} value={newMill}
                    placeholder="新しいミルの名前"
                    onChange={(ev) => setNewMill(ev.target.value)} />
                  <button onClick={addMill} disabled={!newMill.trim()} style={{
                    padding: "0 18px", borderRadius: 10, fontSize: 14, fontWeight: 700,
                    cursor: newMill.trim() ? "pointer" : "default", border: "none",
                    background: newMill.trim() ? C.accent : C.cardLine,
                    color: newMill.trim() ? C.bg : C.muted, fontFamily: "inherit",
                  }}>
                    追加
                  </button>
                </div>
                <p style={{ fontSize: 12, color: C.muted, margin: "8px 0 0" }}>
                  ✕ の付いたミルをタップすると一覧から削除します。過去の記録は消えません。
                </p>
              </div>
            )}

            {form.mill === "その他" && (
              <input style={{ ...input, marginBottom: 10 }} value={form.millCustom}
                placeholder="ミルの名前を入力"
                onChange={(ev) => setForm({ ...form, millCustom: ev.target.value })} />
            )}
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <button onClick={() => setForm({ ...form, clicks: String(Math.max(0, (parseInt(form.clicks) || 0) - 1)) })}
                style={{
                  width: 44, height: 44, borderRadius: 12, fontSize: 20, cursor: "pointer",
                  border: `1px solid ${C.cardLine}`, background: "transparent", color: C.accent,
                }}>−</button>
              <input style={{ ...input, textAlign: "center", flex: 1 }} inputMode="numeric"
                value={form.clicks} placeholder="クリック数"
                onChange={(ev) => setForm({ ...form, clicks: ev.target.value.replace(/[^0-9]/g, "") })} />
              <button onClick={() => setForm({ ...form, clicks: String((parseInt(form.clicks) || 0) + 1) })}
                style={{
                  width: 44, height: 44, borderRadius: 12, fontSize: 20, cursor: "pointer",
                  border: `1px solid ${C.cardLine}`, background: "transparent", color: C.accent,
                }}>＋</button>
              <span style={{ fontSize: 13, color: C.muted, whiteSpace: "nowrap" }}>クリック</span>
            </div>
          </div>

          {/* 抽出タイマー */}
          <div style={{
            background: C.card, border: `1px solid ${C.cardLine}`,
            borderRadius: 14, padding: 18, textAlign: "center",
          }}>
            <span style={label}>抽出タイマー</span>
            <div style={{
              fontSize: 44, fontVariantNumeric: "tabular-nums",
              fontWeight: 200, letterSpacing: "0.04em",
              color: running ? C.accent : C.text, margin: "4px 0 12px",
            }}>
              {fmtTime(running ? elapsed : form.time)}
            </div>

            {/* 注湯回数の設定 */}
            <div style={{
              display: "flex", alignItems: "center", justifyContent: "center",
              gap: 12, marginBottom: 14, fontSize: 13, color: C.muted,
            }}>
              <span>注湯回数</span>
              <button onClick={() => setForm({ ...form, pourTarget: Math.max(1, form.pourTarget - 1) })}
                style={{
                  width: 32, height: 32, borderRadius: 8, fontSize: 16, cursor: "pointer",
                  border: `1px solid ${C.cardLine}`, background: "transparent", color: C.accent,
                }}>−</button>
              <b style={{ color: C.text, fontSize: 16, minWidth: 40 }}>{form.pourTarget} 回</b>
              <button onClick={() => setForm({ ...form, pourTarget: form.pourTarget + 1 })}
                style={{
                  width: 32, height: 32, borderRadius: 8, fontSize: 16, cursor: "pointer",
                  border: `1px solid ${C.cardLine}`, background: "transparent", color: C.accent,
                }}>＋</button>
            </div>

            <div style={{ display: "flex", justifyContent: "center", gap: 14, alignItems: "center" }}>
              <button onClick={toggleTimer} style={{
                width: running ? 84 : 104, height: running ? 84 : 104, borderRadius: "50%", cursor: "pointer",
                border: running ? `2px solid ${C.danger}` : "none",
                background: running ? "transparent" : C.accent,
                color: running ? C.danger : C.bg,
                fontSize: 15, fontWeight: 700,
                boxShadow: running ? "none" : "0 4px 18px rgba(184,121,31,0.3)",
              }}>
                {running ? "終了" : <>開始<br /><span style={{ fontSize: 11, fontWeight: 400 }}>＝1回目の注湯</span></>}
              </button>
              {running && (
                <button onClick={recordPour} style={{
                  width: 104, height: 104, borderRadius: "50%", cursor: "pointer",
                  border: "none", background: C.accent, color: C.bg,
                  fontSize: 16, fontWeight: 700,
                  boxShadow: "0 4px 18px rgba(184,121,31,0.3)",
                }}>
                  注湯<br />
                  <span style={{ fontSize: 12, fontWeight: 400 }}>
                    {form.pours.length + 1}回目
                  </span>
                </button>
              )}
            </div>

            {/* 注湯の記録（手動編集可） */}
            {form.pours.length > 0 && (
              <div style={{ marginTop: 16, textAlign: "left" }}>
                <div style={{
                  display: "grid", gridTemplateColumns: "52px 1fr 1fr 32px",
                  gap: 8, alignItems: "center", fontSize: 12, color: C.muted,
                  padding: "0 2px 6px",
                }}>
                  <span></span><span style={{ textAlign: "center" }}>時間</span>
                  <span style={{ textAlign: "center" }}>湯量 (g)</span><span></span>
                </div>
                {form.pours.map((p, i) => (
                  <div key={i} style={{
                    display: "grid", gridTemplateColumns: "52px 1fr 1fr 32px",
                    gap: 8, alignItems: "center", marginBottom: 8,
                  }}>
                    <span style={{
                      fontSize: 13, fontWeight: 700,
                      color: i < form.pourTarget ? C.accent : C.muted,
                    }}>
                      {i + 1}回目
                    </span>
                    <input style={{ ...input, padding: "9px 8px", textAlign: "center" }}
                      value={p.tStr} placeholder="0:30" inputMode="numeric"
                      onChange={(ev) => updatePour(i, "tStr", ev.target.value)} />
                    <input style={{ ...input, padding: "9px 8px", textAlign: "center" }}
                      value={p.g} placeholder="50" inputMode="decimal"
                      onChange={(ev) => updatePour(i, "g", ev.target.value.replace(/[^0-9.]/g, ""))} />
                    <button onClick={() => removePour(i)} style={{
                      background: "none", border: "none", color: C.danger,
                      fontSize: 16, cursor: "pointer", padding: 4,
                    }}>✕</button>
                  </div>
                ))}
              </div>
            )}
            <button onClick={addPour} style={{
              marginTop: form.pours.length > 0 ? 2 : 12,
              background: "none", border: `1px dashed ${C.accentDim}`,
              borderRadius: 10, color: C.accent, fontSize: 13,
              padding: "8px 14px", cursor: "pointer", fontFamily: "inherit",
            }}>
              ＋ 注湯を手動で追加
            </button>

            {/* 抽出時間の手動編集 */}
            {!running && (
              <div style={{
                display: "flex", alignItems: "center", justifyContent: "center",
                gap: 10, marginTop: 14, fontSize: 13, color: C.muted,
              }}>
                <span>抽出時間</span>
                <input style={{ ...input, width: 88, padding: "9px 8px", textAlign: "center" }}
                  value={form.timeStr} placeholder="2:30" inputMode="numeric"
                  onChange={(ev) => setForm({ ...form, timeStr: ev.target.value })} />
                <span style={{ fontSize: 12 }}>（手動で修正できます）</span>
              </div>
            )}

            <p style={{ fontSize: 12, color: C.muted, margin: "12px 0 0" }}>
              「開始」を押した瞬間が1回目の注湯として記録されます。以降はお湯を注ぐたびに「注湯」をタップ。時間は「1:30」のように分:秒で入力できます。
            </p>
          </div>

          <div>
            <span style={label}>評価</span>
            <div style={{ display: "flex", gap: 8 }}>
              {[1, 2, 3, 4, 5].map((n) => (
                <button key={n} onClick={() => setForm({ ...form, rating: n })}
                  style={{ background: "none", border: "none", padding: 2, cursor: "pointer" }}>
                  <Bean filled={n <= form.rating} />
                </button>
              ))}
            </div>
          </div>

          <div>
            <span style={label}>味の感想</span>
            <textarea style={{ ...input, minHeight: 88, resize: "vertical" }}
              value={form.note} placeholder="酸味が明るい。次はもう少し細かく挽く。"
              onChange={(ev) => setForm({ ...form, note: ev.target.value })} />
          </div>

          <div style={{ display: "flex", gap: 10 }}>
            <button onClick={() => {
              if (running) { toggleTimer(); }
              setForm(EMPTY);
              setEditingId(null);
              setView(selectedBean ? "detail" : "beans");
            }} style={{
              flex: 1, padding: "14px 0", borderRadius: 12, fontSize: 15, cursor: "pointer",
              background: "transparent", border: `1px solid ${C.cardLine}`, color: C.muted,
              fontFamily: "inherit",
            }}>
              やめる
            </button>
            <button onClick={save} disabled={!form.bean.trim()} style={{
              flex: 2, padding: "14px 0", borderRadius: 12, fontSize: 15, fontWeight: 700,
              cursor: form.bean.trim() ? "pointer" : "default",
              background: form.bean.trim() ? C.accent : C.cardLine,
              border: "none", color: form.bean.trim() ? C.bg : C.muted,
              fontFamily: "inherit",
            }}>
              {editingId ? "更新する" : "保存する"}
            </button>
          </div>
        </main>
      )}

      {/* 記録ボタン */}
      {view !== "form" && (
        <button onClick={() => {
          setForm({ ...EMPTY, bean: selectedBean || "", mill: mills[0] || "" });
          setMillEdit(false);
          setView("form");
        }} style={{
          position: "fixed", bottom: 24, left: "50%", transform: "translateX(-50%)",
          padding: "16px 40px", borderRadius: 999, border: "none", cursor: "pointer",
          background: C.accent, color: C.bg, fontSize: 16, fontWeight: 700,
          boxShadow: "0 6px 24px rgba(184,121,31,0.28)",
          fontFamily: "inherit",
        }}>
          ＋ 記録する
        </button>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<CoffeeLog />);
</script>
</body>
</html>
